<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross Fight | Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="dashboard-bg"></div>

<div class="sidebar">
    <h2>Cross Fight</h2>
    <ul>
        <li onclick="navigate('dashboard')">🏠 Dashboard</li>
        <li onclick="navigate('assignments')">📚 Assignments</li>
        <li onclick="navigate('fight')">⚔️ Fight Arena</li>
        <li onclick="navigate('leaderboard')">🏆 Leaderboard</li>
        <li onclick="navigate('profile')">👤 Profile</li>
    </ul>
</div>

<div class="main">
    <header>
        <div class="profile-card">
            <img src="avatar.png" alt="Avatar" class="avatar">
            <div>
                <h3 id="username">Student Name</h3>
                <p>Level <span id="level">5</span> | XP <span id="xp">450</span> | Rank <span id="rank">12</span></p>
            </div>
        </div>
    </header>
<!-- 
    <section class="quick-actions">
        <button class="neon-btn">⚔️ Start Fight</button>
        <button class="neon-btn">📚 Missions</button>
        <button class="neon-btn">🧠 Training</button>
    </section> -->

    <section class="stats-cards">
        <div class="stat-card">
            <h4>Completed Missions</h4>
            <p id="missionsCompleted">8 / 10</p>
            <div class="progress-bar">
                <div class="progress" id="missionsProgress"></div>
            </div>
        </div>

        <div class="stat-card">
            <h4>Total XP</h4>
            <p id="totalXP">450 XP</p>
            <div class="progress-bar">
                <div class="progress" id="xpProgress"></div>
            </div>
        </div>

        <div class="stat-card">
            <h4>Battle Wins</h4>
            <p id="wins">3</p>
            <div class="progress-bar">
                <div class="progress" id="winsProgress"></div>
            </div>
        </div>
    </section>
</div>


<script src="dashboard.js"></script>
</body>
</html>
