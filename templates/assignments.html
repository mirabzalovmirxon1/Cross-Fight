<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross Fight | Assignments</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-bg"></div>

<div class="sidebar">
    <h2>Cross Fight</h2>
    <ul>
        <li onclick="navigate('dashboard')">🏠 Dashboard</li>
        <li onclick="navigate('assignments')">📚 Assignments</li>
        <li onclick="navigate('fight')">⚔️ Fight Arena</li>
        <li onclick="navigate('leaderboard')">🏆 Leaderboard</li>
        <li onclick="navigate('profile')">👤 Profile</li>
    </ul>
</div>

<div class="main">
    <header>
        <h2>Assignments / Mashqlar</h2>
    </header>

    <section class="assignments-list">
        <!-- Repeat for each assignment -->
        <div class="assignment-card">
            <h4>Assignment 1</h4>
            <p>Status: <span class="status">Pending</span></p>
            <input type="file" accept="video/*" class="video-upload" data-assignment="1">
            <button class="submit-btn" onclick="submitVideo(1)">Submit</button>
        </div>

        <div class="assignment-card">
            <h4>Assignment 2</h4>
            <p>Status: <span class="status">Pending</span></p>
            <input type="file" accept="video/*" class="video-upload" data-assignment="2">
            <button class="submit-btn" onclick="submitVideo(2)">Submit</button>
        </div>

        <div class="assignment-card">
            <h4>Assignment 3</h4>
            <p>Status: <span class="status">Pending</span></p>
            <input type="file" accept="video/*" class="video-upload" data-assignment="3">
            <button class="submit-btn" onclick="submitVideo(3)">Submit</button>
        </div>

        <!-- Repeat till 10 -->
    </section>
</div>


<script src="assignments.js"></script>
</body>
</html>
